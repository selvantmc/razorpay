name: flutter_app
description: Nourisha POS Payment Module - A secure Flutter component for processing payments through Razorpay in Point-of-Sale environments
publish_to: 'none'
version: 1.0.0+1

# Author and repository information
# Author: Nourisha Development Team
# Repository: Internal use and third-party integration

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  razorpay_flutter: ^1.3.7
  shared_preferences: ^2.2.2
  http: ^1.1.0
  flutter_animate: ^4.5.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_local_notifications: ^17.0.0
  amplify_api: ^2.0.0
  amplify_flutter: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.8
  faker: ^2.1.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
